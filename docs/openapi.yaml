openapi: 3.0.1
info:
  title: backend-tbd API (skeleton)
  version: '1.0.0'
servers:
  - url: https://api.example.com/api/v1
paths:
  /auth/login:
    post:
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
  /employee-assessment/start:
    post:
      summary: Start employee assessment (invite token)
      parameters:
        - in: header
          name: x-invite-token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Assessment instance and questions
  /responses/{assessmentId}/export:
    get:
      summary: Export responses as Excel
      parameters:
        - in: path
          name: assessmentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Excel file
components: {}
